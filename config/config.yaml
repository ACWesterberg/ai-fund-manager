capital_sek: 50000
cadence: weekly
benchmark: "^OMXSPI"

llm:
  provider: openai          # openai | anthropic
  model_id: "gpt-5.5"       # locked to gpt-5.5-2026-04-23 for reproducibility; override in .env
  temperature: 0.2
  max_tokens: 16000
  reasoning_effort: "high"  # low | medium | high — activates extended reasoning on gpt-5+/o-series

risk:
  max_position_pct: 18      # max single-name weight
  max_positions: 10
  min_cash_pct: 5           # always keep dry powder
  max_cash_pct: 10          # ISK taxed on total balance — minimise idle cash
  min_trade_sek: 2500       # below this, fees eat returns
  max_turnover_pct: 25      # max % of NAV traded per run
  stale_after_days: 5       # block buys if price data older than N trading days
  cold_start_cash_threshold: 80   # if cash% above this, allow faster initial deployment
  cold_start_turnover_pct: 50     # turnover cap used when cold-starting (% of NAV)

fees:
  rate: 0.001               # 0.10%
  min_sek: 1.0
  max_sek: 99.0             # Nordic stocks cap

data:
  price_provider: yfinance
  lookback_days: 252        # ~1 trading year
  news_feeds:
    - "https://www.avanza.se/placera/rss/senaste-analyserna.rss"  # Swedish broker analysis
    - "https://www.di.se/rss"                                      # Dagens Industri (SE)
    - "https://mfn.se/a/all.rss"                                   # Nordic regulatory filings & press releases
    - "https://e24.no/rss.xml"                                     # E24 (NO)
  macro_feeds:
    - "https://feeds.bbci.co.uk/news/business/rss.xml"             # BBC Business
    - "https://www.cnbc.com/id/100003114/device/rss/rss.html"      # CNBC Business
    - "https://www.cnbc.com/id/100727362/device/rss/rss.html"      # CNBC World/Economy
    - "https://feeds.a.wsj.com/rss/RSSWorldNews.xml"               # WSJ World News
  sentiment:
    enabled: true
    model: "ProsusAI/finbert"
    device: "cpu"           # cpu | cuda
    trigger_threshold_negative: 0.80   # fire early run if held ticker hits this (0-1)
    trigger_threshold_positive: 0.85   # fire early run for unwatched ticker (higher bar)
    trigger_cooldown_hours: 6          # don't fire twice within this window per ticker

screener:
  top_n: 75   # candidates passed to LLM per run; held positions always included on top

web:
  host: "0.0.0.0"
  port: 8000

reporting:
  currency: SEK
  output_dir: "data/reports"
